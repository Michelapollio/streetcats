<!DOCTYPE html>
<div class="auth-container">
    <div class="auth-card">
        <h2>Accedi a Streetcats 🐾</h2>
        <form (ngSubmit)="onLogin()">
            <div class="form-group">
                <label>Email</label>
                <input type="email"
                 name="email" 
                 [(ngModel)]="loginData.email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password"
                 name="password" 
                 [(ngModel)]="loginData.password" required>
            </div>

            <button type="submit" class="btn-primary">
                Entra
            </button>
        </form>
        <p>Non hai un account? <a routerLink="/register">
            Registrati
        </a></p>
    </div>
</div>
