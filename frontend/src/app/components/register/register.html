
<!DOCTYPE html>
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <span class="logo-icon">🐾</span>
      <h2>Unisciti a StreetCats</h2>
      <p>Crea un account per iniziare a mappare i gatti della tua città.</p>
    </div>

    <form (ngSubmit)="onRegister()">
      <div class="form-group">
        <label>Nome Utente</label>
        <input type="text" name="username" 
          [(ngModel)]="userData.username" 
          placeholder="username123">
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" 
        name="email"
        placeholder="latua@email.it" 
        [(ngModel)]="userData.email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" 
        name="password"
        placeholder="Scegli una password" 
        [(ngModel)]="userData.password" required>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Conferma Password</label>
        <input type="password" id="confirmPassword" placeholder="Ripeti la password">
      </div>
      </form>

      <form (ngSubmit)="onRegister()">
      <button type="submit" class="btn-primary">
        Registrati ora
      </button>
      </form>

    <div class="auth-footer">
      <p>Hai già un account? <a routerLink="/login">Accedi qui</a></p>
    </div>
  </div>
</div>
