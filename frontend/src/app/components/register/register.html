<div class="login-page">
  
  <div class="login-side">
    <div class="login-card">
      <div class="logo-container">
        <img src="assets/logo-streetcats.png" alt="StreetCats Logo">
        <h1>STREET<span>CATS</span></h1>
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
        
        <div class="input-group">
          <label>Username</label>
          <input type="text" formControlName="username" placeholder="user123">
          <small *ngIf="registerForm.get('username')?.touched && registerForm.get('username')?.invalid" class="error-text">
            Lo username è obbligatorio.
          </small>
        </div>

        <div class="input-group">
          <label>Email</label>
          <input type="email" formControlName="email" placeholder="nome@esempio.com">
          <small *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid" class="error-text">
            Inserisci un'email valida.
          </small>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" formControlName="password" placeholder="••••••••">
          <small *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid" class="error-text">
            La password deve avere almeno 6 caratteri.
          </small>
        </div>

        <div class="input-group">
          <label>Conferma Password</label>
          <input type="password" formControlName="confirmPassword" placeholder="••••••••">
          <small *ngIf="registerForm.get('confirmPassword')?.touched && registerForm.hasError('mismatch')" class="error-text">
            Le password non coincidono.
          </small>
        </div>

        <button type="submit" class="btn-login" [disabled]="registerForm.invalid">
          Registrati
        </button>
        
        <p class="switch-auth">
          Hai già un account? <a routerLink="/login">Accedi</a>
        </p>
      </form>
    </div>
  </div>

  <div class="map-side">
    <app-map 
      [mapId]="'registerMap'"
      [interactive]="false" 
      [zoom]="14">
    </app-map>
    <div class="map-overlay"></div>
  </div>

</div>
