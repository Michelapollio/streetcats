<!doctype html>
<nav class="main-navbar">
  <div class="navbar-content">
    <div class="logo-section">
      <img src="assets/logo-streetcats.png" alt="Logo StreetCats" class="logo-img" />
    </div>

    <div class="search-section">
      <div class="search-bar">
        <input type="text" placeholder="Search city or street ..." class="search-input" />
        <span class="search-icon">🔍</span>
      </div>
    </div>

    <div class="nav-menu">
      <a routerLink="/explore" class="nav-item">Explore</a>
      <a routerLink="/info" class="nav-item">About</a>

      <ng-container *ngIf="isLoggedIn$ | async as loggedIn; else guestButtons">
        <a routerLink="/profile" class="nav-item profile-link">My Profile</a>
        <button (click)="onLogout()" class="btn-logout">Logout</button>
      </ng-container>

      <ng-template #guestButtons>
        <div class="auth-buttons">
          <button routerLink="/login" class="btn-login">Login</button>
          <button routerLink="/register" class="btn-register">Register</button>
        </div>
      </ng-template>
    </div>
  </div>
</nav>
